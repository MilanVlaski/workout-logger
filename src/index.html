<!DOCTYPE html>
<html lang="en">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script>
        // Prevent FOUC - apply theme before rendering.
        (function () {
            var t = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>

    <!-- <link rel="stylesheet" href="/assets/css/common.css"> -->
    <link rel="stylesheet" href="/assets/css/oat.min.css">
    <link rel="stylesheet" href="/assets/css/common.css">
    <link rel="stylesheet" href="/assets/css/workout.css">
    
    <!-- dev -->
    <script defer src="/assets/js/test_fixture.js"></script>
    
    <script defer src="/assets/js/oat.min.js"></script>
    <script type="module" src="/assets/js/components/all-reps.js"></script>
    <script type="module" src="/assets/js/components/exercise-input.js"></script>
    <script type="module" src="/assets/js/components/the-exercise.js"></script>
    <script type="module" src="/assets/js/components/close-btn.js"></script>
    <script type="module" src="/assets/js/components/workout-start-time.js"></script>

    <script type="module" src="/assets/js/main.js"></script>
    <!-- <script type="module" src="/assets/js/db.js"></script> -->
    <title>Workout Logger</title>
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <symbol id="remove" viewBox="0 -960 960 960">
            <path d="M200-440v-80h560v80H200Z"/>
        </symbol>
        <symbol id="add" viewBox="0 -960 960 960"> 
            <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z"/>
        </symbol>
        <symbol id="weight" viewBox="0 -960 960 960">
            <path d="M240-200h480l-57-400H297l-57 400Zm240-480q17 0 28.5-11.5T520-720q0-17-11.5-28.5T480-760q-17 0-28.5 11.5T440-720q0 17 11.5 28.5T480-680Zm113 0h70q30 0 52 20t27 49l57 400q5 36-18.5 63.5T720-120H240q-37 0-60.5-27.5T161-211l57-400q5-29 27-49t52-20h70q-3-10-5-19.5t-2-20.5q0-50 35-85t85-35q50 0 85 35t35 85q0 11-2 20.5t-5 19.5ZM240-200h480-480Z"/>
        </symbol>
        <symbol id="check" viewBox="0 -960 960 960">
            <path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z" />
        </symbol>
        <symbol id="two-check" viewBox="0 -960 960 960">
            <path d="M268-240 42-466l57-56 170 170 56 56-57 56Zm226 0L268-466l56-57 170 170 368-368 56 57-424 424Zm0-226-57-56 198-198 57 56-198 198Z"/>
        </symbol>
        <symbol id="sync" viewBox="0 -960 960 960">
            <path d="M160-160v-80h110l-16-14q-52-46-73-105t-21-119q0-111 66.5-197.5T400-790v84q-72 26-116 88.5T240-478q0 45 17 87.5t53 78.5l10 10v-98h80v240H160Zm400-10v-84q72-26 116-88.5T720-482q0-45-17-87.5T650-648l-10-10v98h-80v-240h240v80H690l16 14q49 49 71.5 106.5T800-482q0 111-66.5 197.5T560-170Z"/>
        </symbol>
        <symbol id="dumbbell" viewBox="0 -960 960 960">
            <path d="m532.41-79.93-61.5-61.5 142-142-329.48-329.48-142 142-61.5-61.5 56-57.52-56-56 84.48-84.48-56-57.52 63.66-63.66 57.52 56 84.48-84.48 56 56 57.52-56 61.5 61.5-142 142 329.48 329.48 142-142 61.5 61.5-56 57.52 56 56-84.48 84.48 56 57.52-63.66 63.66-57.52-56-84.48 84.48-56-56-57.52 56Z"/>
        </symbol>
        <symbol id="x" viewBox="0 -960 960 960" fill="#e3e3e3">
            <path d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z" />
        </symbol>
    </svg>
 

    <ot-tabs>
            <nav class="button-group container" role="tablist">
                <button role="tab">Workout</button>
                <button role="tab">Log</button>
            </nav>

            <nav></nav>
            
            <article class="container workout" role="tabpanel">
                
                <h1>
                    <workout-start-time></workout-start-time>
                </h1>
    
                <the-exercise></the-exercise>
                <form class="temporary-log" action="finish-workout">
                    <label data-field>
                        <h2>Temporary Log</h2>
                        <textarea class="temporary-log-input" required></textarea>
                    </label>
                    <button class="primary" style="width: 100%;">
                        <svg><use href="#two-check"></use></svg>
                        Finish Workout
                    </button>
                </section>
            </article>
    
        <section class="container" role="tabpanel">
            <h1>Workout Log</h1>
            <pre id="workout-log"></pre>
        </div>
    </ot-tabs>

    
    
    <!-- TEMPLATES -->
    <template id="the-exercise">
        <form action="finish-exercise" class="current-exercise">
            <h2>Exercise</h2>
            <label data-field>Exercise Name
                <input type="search" name="exercise-name" id="exercise-input" required>
            </label>
        
            <exercise-input></exercise-input>
        
            <label data-field>Comment
                <input type="search" id="comment" name="comment">
            </label>
        
            <div class="exercise-actions">
                <button type="button" class="outline" id="new-exercise-btn">
                    <svg>
                        <use href="#dumbbell"></use>
                    </svg>
                    New Exercise
                </button>
                <button type="submit" id="finish-btn">
                    <svg>
                        <use href="#check"></use>
                    </svg>
                    Finish Exercise
                </button>
            </div>
    
        </form>
    </template>

    <template id="exercise-input">
        <div class="exercise-input">
            <all-reps></all-reps>
            <label data-field>Weight
                <div class="half-screen-buttons">
                    <input type="search" id="weight" name="weight">
                    <button type="button" class="outline" id="new-weight-btn">
                        <svg>
                            <use href="#weight"></use>
                        </svg>
                        New Weight
                    </button>
                </div>
            </label>
        </div>
    </template>

    <template id="all-reps">
        <label data-field>Reps
            <div class="all-reps">
                <input type="text" inputmode="numeric" name="reps">
            </div>
        </label>
        <div class="half-screen-buttons">
            <button type="button" data-variant="danger" class="outline">
                <svg>
                    <use href="#remove"></use>
                </svg>
                Remove Reps
            </button>
            <button type="button" class="outline" id="add-reps">
                <svg>
                    <use href="#add"></use>
                </svg>
                Add Reps
            </button>
        </div>
    </template>

    <template id="reps-input">
        <input type="text" inputmode="numeric" name="reps">
    </template>

</body>
</html>
