    <ot-tabs>
            <nav class="button-group container" role="tablist">
                <button role="tab">Workout</button>
                <button role="tab">Log</button>
            </nav>

            <nav></nav>
            
            <article class="container workout" role="tabpanel">
                
                <h1>
                    <workout-start-time></workout-start-time>
                </h1>
    
                <the-exercise></the-exercise>
                <form class="temporary-log" action="finish-workout">
                    <label data-field>
                        <h2>Temporary Log</h2>
                        <pre class="temporary-log-input"></pre>
                    </label>
                    <button class="primary" style="width: 100%;">
                        <svg><use href="#two-check"></use></svg>
                        Finish Workout
                    </button>
                </section>
            </article>
    
        <section class="container" role="tabpanel">
            <h1>Workout Log</h1>
            <button data-action="export-csv">
                <svg><use href="#export-note"></use></svg>
            Export CSV
            </button>
            <select style="width: max-content; margin-top: 0;" data-action="change-exercise-format">
                <option value="multi" selected>Multi line</option>
                <option value="single">Single line</option>
            </select>
            <pre class="workout-log"></pre>
        </div>
